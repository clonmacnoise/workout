<script>
const WINDOW_DAYS = 2;
const OFFICIAL_START_DATE = new Date(2026, 5, 9);
const STATE_KEY = 'workout_queue_state_v1';
const EVENT_LOG_KEY = 'workout_event_log_v1';
const STORAGE_HIDDEN = 'hidden_blocks';
const LEGACY_START = 'cycle_start';
const LEGACY_COMPLETED = 'cycle_completed';

const programConfig = normalizeProgram(window.WORKOUT_PROGRAM);
const workouts = programConfig.workouts;
if (!workouts.length) throw new Error('Workout program failed to load.');

let state;
state = reconcileState();
let current = getCurrentWorkout();

function normalizeProgram(raw) {
  if (raw && Array.isArray(raw.workouts)) {
    return {
      version: raw.version || 'unversioned',
      workouts: raw.workouts.map((workout, index) => ({
        key: workout.key || 'day-' + (index + 1),
        label: workout.label || 'Day ' + (index + 1),
        blocks: workout.blocks || []
      }))
    };
  }

  return {
    version: 'legacy',
    workouts: Object.keys(raw || {}).map((label, index) => ({
      key: 'day-' + (index + 1),
      label,
      blocks: raw[label]
    }))
  };
}

function startOfDay(d) {
  return new Date(d.getFullYear(), d.getMonth(), d.getDate());
}

function addDays(d, daysToAdd) {
  const next = new Date(d);
  next.setDate(next.getDate() + daysToAdd);
  return next;
}

function getToday() {
  return startOfDay(new Date());
}

function toDateKey(d) {
  const year = d.getFullYear();
  const month = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return year + '-' + month + '-' + day;
}

function fromDateKey(key) {
  const parts = String(key || '').split('-').map(Number);
  if (parts.length !== 3 || parts.some(Number.isNaN)) return getToday();
  return new Date(parts[0], parts[1] - 1, parts[2]);
}

function formatShortDate(d) {
  return d.toLocaleDateString('en-US', { month: 'numeric', day: 'numeric' });
}

function formatWindow(start) {
  const end = addDays(start, WINDOW_DAYS - 1);
  return formatShortDate(start) + '-' + formatShortDate(end);
}

function getEventLog() {
  try {
    const parsed = JSON.parse(localStorage.getItem(EVENT_LOG_KEY) || '[]');
    return Array.isArray(parsed) ? parsed : [];
  } catch {
    return [];
  }
}

function setEventLog(events) {
  localStorage.setItem(EVENT_LOG_KEY, JSON.stringify(events));
}

function appendEvent(event) {
  const events = getEventLog();
  events.push({
    id: event.type + '-' + event.workoutKey + '-' + event.windowStart + '-' + Date.now(),
    schemaVersion: 1,
    programVersion: programConfig.version,
    ...event
  });
  setEventLog(events);
}

function getStoredState() {
  try {
    const parsed = JSON.parse(localStorage.getItem(STATE_KEY) || 'null');
    if (!parsed || typeof parsed !== 'object') return null;
    if (typeof parsed.currentWorkoutIndex !== 'number') return null;
    if (!parsed.windowStart) return null;
    return parsed;
  } catch {
    return null;
  }
}

function saveState(nextState) {
  state = {
    schemaVersion: 1,
    programVersion: programConfig.version,
    currentWorkoutIndex: clampWorkoutIndex(nextState.currentWorkoutIndex),
    windowStart: toDateKey(startOfDay(fromDateKey(nextState.windowStart))),
    updatedAt: toDateKey(getToday())
  };
  localStorage.setItem(STATE_KEY, JSON.stringify(state));
  return state;
}

function clampWorkoutIndex(index) {
  if (!Number.isFinite(index)) return 0;
  return Math.max(0, Math.min(workouts.length - 1, index));
}

function getOfficialStart() {
  return startOfDay(OFFICIAL_START_DATE);
}

function getInitialWindowStart() {
  const today = getToday();
  const officialStart = getOfficialStart();
  return today < officialStart ? officialStart : today;
}

function migrateLegacyState() {
  let completed = [];
  try {
    completed = JSON.parse(localStorage.getItem(LEGACY_COMPLETED) || '[]');
    if (!Array.isArray(completed)) completed = [];
  } catch {
    completed = [];
  }

  const storedStart = parseInt(localStorage.getItem(LEGACY_START) || '', 10);
  const legacyStart = Number.isNaN(storedStart) ? getInitialWindowStart() : startOfDay(new Date(storedStart));
  const completedCount = Math.min(completed.length, workouts.length);

  if (completedCount && getEventLog().length === 0) {
    const imported = completed.slice(0, completedCount).map((label, index) => {
      const workout = workouts[index];
      const completedAt = toDateKey(addDays(legacyStart, index * WINDOW_DAYS));
      return {
        id: 'legacy-complete-' + workout.key + '-' + completedAt,
        schemaVersion: 1,
        programVersion: programConfig.version,
        type: 'complete',
        workoutKey: workout.key,
        workoutLabel: workout.label || label,
        windowStart: completedAt,
        windowEnd: toDateKey(addDays(fromDateKey(completedAt), WINDOW_DAYS - 1)),
        completedAt,
        importedFrom: 'cycle_completed'
      };
    });
    setEventLog(imported);
  }

  if (completedCount >= workouts.length) {
    return saveState({
      currentWorkoutIndex: 0,
      windowStart: toDateKey(addDays(legacyStart, workouts.length * WINDOW_DAYS))
    });
  }

  return saveState({
    currentWorkoutIndex: completedCount,
    windowStart: toDateKey(addDays(legacyStart, completedCount * WINDOW_DAYS))
  });
}

function getCurrentWorkout() {
  return workouts[clampWorkoutIndex(state.currentWorkoutIndex)];
}

function reconcileState() {
  const stored = getStoredState();
  let nextState = stored || migrateLegacyState();

  if (nextState.programVersion !== programConfig.version) {
    nextState = saveState({
      ...nextState,
      currentWorkoutIndex: clampWorkoutIndex(nextState.currentWorkoutIndex)
    });
  }

  const today = getToday();
  let windowStart = fromDateKey(nextState.windowStart);
  let windowEndExclusive = addDays(windowStart, WINDOW_DAYS);

  while (today >= windowEndExclusive) {
    const workout = workouts[clampWorkoutIndex(nextState.currentWorkoutIndex)];
    appendEvent({
      type: 'miss',
      workoutKey: workout.key,
      workoutLabel: workout.label,
      windowStart: toDateKey(windowStart),
      windowEnd: toDateKey(addDays(windowEndExclusive, -1)),
      recordedAt: toDateKey(windowEndExclusive)
    });
    windowStart = windowEndExclusive;
    windowEndExclusive = addDays(windowStart, WINDOW_DAYS);
  }

  return saveState({
    ...nextState,
    windowStart: toDateKey(windowStart)
  });
}

function getWindowStart() {
  return fromDateKey(state.windowStart);
}

function getWindowEnd() {
  return addDays(getWindowStart(), WINDOW_DAYS - 1);
}

function isWindowOpen() {
  return getToday() >= getWindowStart();
}

function getYearEvents(type) {
  const year = getToday().getFullYear();
  return getEventLog().filter(event => {
    const key = event.completedAt || event.recordedAt;
    return event.type === type && fromDateKey(key).getFullYear() === year;
  });
}

function getRollingMisses(daysBack) {
  const today = getToday();
  const start = addDays(today, -(daysBack - 1));
  return getEventLog().filter(event => {
    if (event.type !== 'miss') return false;
    const recordedAt = fromDateKey(event.recordedAt);
    return recordedAt >= start && recordedAt <= today;
  });
}

function getPerformance(missCount) {
  if (missCount <= 4) return 'High';
  if (missCount <= 10) return 'Medium';
  return 'Low';
}

function getCurrentWorkoutMisses() {
  const workout = getCurrentWorkout();
  const lastCompleteIndex = [...getEventLog()].reverse().findIndex(event =>
    event.type === 'complete' && event.workoutKey === workout.key
  );
  const events = getEventLog();
  const cutoff = lastCompleteIndex === -1 ? -1 : events.length - 1 - lastCompleteIndex;
  return events.filter((event, index) =>
    index > cutoff && event.type === 'miss' && event.workoutKey === workout.key
  ).length;
}

function completeCurrentWorkout() {
  if (!isWindowOpen()) return;

  const workout = getCurrentWorkout();
  const today = getToday();
  appendEvent({
    type: 'complete',
    workoutKey: workout.key,
    workoutLabel: workout.label,
    windowStart: state.windowStart,
    windowEnd: toDateKey(getWindowEnd()),
    completedAt: toDateKey(today)
  });

  localStorage.removeItem(STORAGE_HIDDEN);

  saveState({
    currentWorkoutIndex: (state.currentWorkoutIndex + 1) % workouts.length,
    windowStart: toDateKey(addDays(today, 1))
  });

  state = reconcileState();
  current = getCurrentWorkout();
}

function getHiddenBlocks() {
  try { return JSON.parse(localStorage.getItem(STORAGE_HIDDEN) || '{}'); }
  catch { return {}; }
}

function isBlockHidden(workoutKey, blockIdx) {
  const hidden = getHiddenBlocks();
  return !!(hidden[workoutKey] && hidden[workoutKey].includes(blockIdx));
}

function hideBlock(workoutKey, blockIdx) {
  const hidden = getHiddenBlocks();
  if (!hidden[workoutKey]) hidden[workoutKey] = [];
  if (!hidden[workoutKey].includes(blockIdx)) hidden[workoutKey].push(blockIdx);
  localStorage.setItem(STORAGE_HIDDEN, JSON.stringify(hidden));
}

function addSwipeListeners() {
  document.querySelectorAll('.block-card').forEach(card => {
    let startX = 0, startY = 0, tracking = false, dismissed = false;

    card.addEventListener('touchstart', e => {
      if (dismissed) return;
      startX = e.touches[0].clientX;
      startY = e.touches[0].clientY;
      tracking = true;
      card.style.transition = 'none';
    }, { passive: true });

    card.addEventListener('touchmove', e => {
      if (!tracking || dismissed) return;
      const dx = e.touches[0].clientX - startX;
      const dy = e.touches[0].clientY - startY;
      if (Math.abs(dx) > Math.abs(dy) && dx < 0) {
        const clamped = Math.max(dx, -window.innerWidth);
        card.style.transform = `translateX(${clamped}px)`;
        card.style.opacity = String(Math.max(0, 1 + clamped / (window.innerWidth * 0.5)));
      }
    }, { passive: true });

    card.addEventListener('touchend', e => {
      if (!tracking || dismissed) return;
      tracking = false;
      const dx = e.changedTouches[0].clientX - startX;

      if (dx < -80) {
        dismissed = true;
        const blockIdx = parseInt(card.dataset.blockIndex, 10);

        card.style.transition = 'transform 0.25s ease-out, opacity 0.2s ease-out';
        card.style.transform = 'translateX(-110vw)';
        card.style.opacity = '0';

        setTimeout(() => {
          const h = card.offsetHeight;
          card.style.transition = 'none';
          card.style.maxHeight = h + 'px';
          card.style.overflow = 'hidden';
          void card.offsetHeight;
          card.style.transition = 'max-height 0.25s ease-out, margin-bottom 0.25s ease-out';
          card.style.maxHeight = '0';
          card.style.marginBottom = '0';

          setTimeout(() => {
            hideBlock(current.key, blockIdx);
            card.remove();
          }, 260);
        }, 260);
      } else {
        card.style.transition = 'transform 0.25s ease-out, opacity 0.2s ease-out';
        card.style.transform = '';
        card.style.opacity = '';
        setTimeout(() => { if (!dismissed) card.style.transition = ''; }, 260);
      }
    }, { passive: true });
  });
}

function updateHeader() {
  const yearDone = getYearEvents('complete').length;
  const rollingMisses = getRollingMisses(90).length;
  const performance = getPerformance(rollingMisses);
  const currentMisses = getCurrentWorkoutMisses();
  const pct = Math.min(100, Math.round((yearDone / 104) * 100));
  const perfClass = performance.toLowerCase();

  document.getElementById('cycleFill').style.width = pct + '%';
  document.getElementById('cycleCount').textContent =
    current.label + ' · due ' + formatShortDate(getWindowEnd());
  document.getElementById('cycleSubtitle').textContent =
    'Window ' + formatWindow(getWindowStart());
  document.getElementById('completedCount').textContent = yearDone;
  document.getElementById('missedCount').textContent = rollingMisses;
  const performanceEl = document.getElementById('nextWorkout');
  performanceEl.textContent = performance;
  performanceEl.className = 'status-value performance-' + perfClass;
}

function renderContent() {
  const data = current.blocks;
  const windowStart = getWindowStart();
  const windowEnd = getWindowEnd();
  const currentMisses = getCurrentWorkoutMisses();
  const startsInFuture = !isWindowOpen();

  const blocksHtml = data.map((block, blockIdx) => {
    if (isBlockHidden(current.key, blockIdx)) return '';
    return `<div class="block-card" data-block-index="${blockIdx}">
      <div class="block-header">
        <div class="block-badge badge-${block.block}">${block.block}</div>
        <span class="block-label">Block ${block.block}</span>
        <span class="block-sets">${block.sets} sets</span>
      </div>
      ${block.exercises.map(ex =>
        `<div class="exercise-row">
          <div class="ex-name">${ex.name}</div>
          <div class="ex-chips">
            <span class="chip chip-weight">${ex.weight}</span>
            <span class="chip chip-reps">${ex.reps}</span>
            ${block.note ? `<span class="chip chip-note">${block.note}</span>` : ``}
          </div>
        </div>`
      ).join('')}
    </div>`;
  }).join('');

  const missBadge = currentMisses
    ? `<span class="done-badge missed-badge">${currentMisses} MISSED</span>`
    : '';
  const pendingBadge = startsInFuture
    ? `<span class="done-badge pending-badge">STARTS ${formatShortDate(windowStart)}</span>`
    : '';
  const btnLabel = startsInFuture
    ? 'Starts ' + formatShortDate(windowStart)
    : 'Mark workout complete';
  const btnClass = startsInFuture ? 'btn-complete is-done' : 'btn-complete';
  const btnDisabled = startsInFuture ? ' disabled' : '';

  document.getElementById('content').innerHTML =
    `<div class="day-heading">${current.label} · ${formatWindow(windowStart)} ${missBadge}${pendingBadge}</div>` +
    blocksHtml +
    `<div class="complete-area">
      <button class="${btnClass}" onclick="handleComplete()"${btnDisabled}>${btnLabel}</button>
    </div>`;

  window.scrollTo(0, 0);
}

function renderAll() {
  state = reconcileState();
  current = getCurrentWorkout();
  updateHeader();
  renderContent();
  addSwipeListeners();
}

function handleComplete() {
  completeCurrentWorkout();
  renderAll();
}

renderAll();
</script>


</body></html>

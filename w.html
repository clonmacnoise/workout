<script src="./program.js"></script>
<script>
const CYCLE_DAYS = 14;
const WORKOUT_GAP_DAYS = 2;
const OFFICIAL_START_DATE = new Date(2026, 5, 9);
const STORAGE_START     = 'cycle_start';
const STORAGE_COMPLETED = 'cycle_completed';
const STORAGE_HIDDEN    = 'hidden_blocks';

const program = window.WORKOUT_PROGRAM;
if (!program) throw new Error('Workout program failed to load.');

const days = Object.keys(program);
let current = "Day 1";

// --- Cycle helpers ---
function startOfDay(d) {
  return new Date(d.getFullYear(), d.getMonth(), d.getDate());
}

function addDays(d, daysToAdd) {
  const next = new Date(d);
  next.setDate(next.getDate() + daysToAdd);
  return next;
}

function saveCycleStart(date) {
  const start = startOfDay(date);
  localStorage.setItem(STORAGE_START, start.getTime());
  setCompleted([]);
  localStorage.removeItem(STORAGE_HIDDEN);
  return start;
}

function getCycleStart() {
  const today = startOfDay(new Date());
  const officialStart = startOfDay(OFFICIAL_START_DATE);
  const stored = localStorage.getItem(STORAGE_START);

  if (!stored) return saveCycleStart(officialStart);

  const parsed = parseInt(stored, 10);
  if (Number.isNaN(parsed)) return saveCycleStart(officialStart);

  const start = startOfDay(new Date(parsed));
  const cycleEnd = addDays(start, CYCLE_DAYS);

  if (start < officialStart) return saveCycleStart(officialStart);
  if (today >= cycleEnd) return saveCycleStart(today);

  return start;
}

function getToday() {
  return startOfDay(new Date());
}

function getDaysRemaining() {
  const start = getCycleStart();
  const end = addDays(start, CYCLE_DAYS);
  const remaining = Math.ceil((end - getToday()) / 86400000);
  return Math.max(0, remaining);
}

function formatStartDate(d) {
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function formatShortDate(d) {
  return d.toLocaleDateString('en-US', { month: 'numeric', day: 'numeric' });
}

function getSchedule() {
  const start = getCycleStart();
  return days.map((day, index) => ({
    day,
    date: addDays(start, index * WORKOUT_GAP_DAYS)
  }));
}

function getCompleted() {
  try { return JSON.parse(localStorage.getItem(STORAGE_COMPLETED) || '[]'); }
  catch { return []; }
}

function setCompleted(arr) {
  localStorage.setItem(STORAGE_COMPLETED, JSON.stringify(arr));
}

function isDone(day) { return getCompleted().includes(day); }

function getMissed() {
  const today = getToday();
  return getSchedule()
    .filter(item => !isDone(item.day) && today >= addDays(item.date, WORKOUT_GAP_DAYS))
    .map(item => item.day);
}

function getScheduleItem(day) {
  return getSchedule().find(item => item.day === day);
}

function getActiveDay() {
  const missed = getMissed();
  const next = getSchedule().find(item => !isDone(item.day) && !missed.includes(item.day));
  return next ? next.day : days[days.length - 1];
}

function toggleDone(day) {
  if (getMissed().includes(day)) return;
  let completed = getCompleted();
  if (completed.includes(day)) {
    completed = completed.filter(d => d !== day);
  } else {
    completed.push(day);
  }
  setCompleted(completed);
}

// --- Hidden block helpers ---
function getHiddenBlocks() {
  try { return JSON.parse(localStorage.getItem(STORAGE_HIDDEN) || '{}'); }
  catch { return {}; }
}

function isBlockHidden(day, blockIdx) {
  const hidden = getHiddenBlocks();
  return !!(hidden[day] && hidden[day].includes(blockIdx));
}

function hideBlock(day, blockIdx) {
  const hidden = getHiddenBlocks();
  if (!hidden[day]) hidden[day] = [];
  if (!hidden[day].includes(blockIdx)) hidden[day].push(blockIdx);
  localStorage.setItem(STORAGE_HIDDEN, JSON.stringify(hidden));
}

function handleReset() {
  saveCycleStart(getToday());
  renderAll();
}

// --- Swipe to hide ---
function addSwipeListeners() {
  document.querySelectorAll('.block-card').forEach(card => {
    let startX = 0, startY = 0, tracking = false, dismissed = false;

    card.addEventListener('touchstart', e => {
      if (dismissed) return;
      startX = e.touches[0].clientX;
      startY = e.touches[0].clientY;
      tracking = true;
      // Remove any transition so dragging feels instant
      card.style.transition = 'none';
    }, { passive: true });

    card.addEventListener('touchmove', e => {
      if (!tracking || dismissed) return;
      const dx = e.touches[0].clientX - startX;
      const dy = e.touches[0].clientY - startY;
      // Only intercept clearly horizontal left-swipes
      if (Math.abs(dx) > Math.abs(dy) && dx < 0) {
        const clamped = Math.max(dx, -window.innerWidth);
        card.style.transform = `translateX(${clamped}px)`;
        // Fade out as it travels — fully transparent at half-screen
        card.style.opacity = String(Math.max(0, 1 + clamped / (window.innerWidth * 0.5)));
      }
    }, { passive: true });

    card.addEventListener('touchend', e => {
      if (!tracking || dismissed) return;
      tracking = false;
      const dx = e.changedTouches[0].clientX - startX;

      if (dx < -80) {
        // Crossed threshold — commit the dismiss
        dismissed = true;
        const blockIdx = parseInt(card.dataset.blockIndex, 10);

        // Phase 1: slide fully off screen
        card.style.transition = 'transform 0.25s ease-out, opacity 0.2s ease-out';
        card.style.transform = 'translateX(-110vw)';
        card.style.opacity = '0';

        setTimeout(() => {
          // Phase 2: collapse height so cards below slide up
          const h = card.offsetHeight;
          card.style.transition = 'none';
          card.style.maxHeight = h + 'px';
          card.style.overflow = 'hidden';
          // Force reflow so the browser registers the starting max-height
          void card.offsetHeight;
          card.style.transition = 'max-height 0.25s ease-out, margin-bottom 0.25s ease-out';
          card.style.maxHeight = '0';
          card.style.marginBottom = '0';

          setTimeout(() => {
            // Save state and remove from DOM — no re-render needed
            hideBlock(current, blockIdx);
            card.remove();
          }, 260);
        }, 260);

      } else {
        // Didn't reach threshold — snap back
        card.style.transition = 'transform 0.25s ease-out, opacity 0.2s ease-out';
        card.style.transform = '';
        card.style.opacity = '';
        setTimeout(() => { if (!dismissed) card.style.transition = ''; }, 260);
      }
    }, { passive: true });
  });
}

// --- Render ---
function updateCycleBar() {
  const completed = getCompleted();
  const missed = getMissed();
  const completeCount = completed.length;
  const missedCount = missed.length;
  const resolvedCount = completeCount + missedCount;
  const pct = Math.round((resolvedCount / days.length) * 100);
  const remaining = getDaysRemaining();
  const start = getCycleStart();
  const activeItem = getScheduleItem(current);

  document.getElementById('cycleFill').style.width = pct + '%';
  document.getElementById('cycleCount').textContent = completeCount + ' done · ' + missedCount + ' missed';
  document.getElementById('cycleSubtitle').textContent = remaining + ' days left';
  document.getElementById('completedCount').textContent = completeCount + '/7';
  document.getElementById('missedCount').textContent = missedCount;
  document.getElementById('nextWorkout').textContent = activeItem ? formatShortDate(activeItem.date) : '--';
  const resetMeta = document.getElementById('resetMeta');
  if (resetMeta) {
    resetMeta.textContent =
      'Started ' + formatStartDate(start) + ' · resets in ' + remaining + ' day' + (remaining === 1 ? '' : 's');
  }
}

function renderContent() {
  const data = program[current];
  const item = getScheduleItem(current);
  const done = isDone(current);
  const missed = getMissed().includes(current);
  const dateLabel = item ? formatShortDate(item.date) : current;

  // Render only blocks that haven't been swiped away
  const blocksHtml = data.map((block, blockIdx) => {
    if (isBlockHidden(current, blockIdx)) return '';
    return `<div class="block-card" data-block-index="${blockIdx}">
      <div class="block-header">
        <div class="block-badge badge-${block.block}">${block.block}</div>
        <span class="block-label">Block ${block.block}</span>
        <span class="block-sets">${block.sets} sets</span>
      </div>
      ${block.exercises.map(ex =>
        `<div class="exercise-row">
          <div class="ex-name">${ex.name}</div>
          <div class="ex-chips">
            <span class="chip chip-weight">${ex.weight}</span>
            <span class="chip chip-reps">${ex.reps}</span>
            ${block.note ? `<span class="chip chip-note">${block.note}</span>` : ``}
          </div>
        </div>`
      ).join('')}
    </div>`;
  }).join('');

  const headingBadge = done
    ? `<span class="done-badge">DONE</span>`
    : missed
      ? `<span class="done-badge missed-badge">MISSED</span>`
      : '';
  const btnLabel = done ? 'Mark as incomplete' : missed ? 'Workout missed' : 'Mark as complete';
  const btnClass = done || missed ? 'btn-complete is-done' : 'btn-complete';
  const btnDisabled = missed ? ' disabled' : '';

  document.getElementById("content").innerHTML =
    `<div class="day-heading">${dateLabel} · ${current} ${headingBadge}</div>` +
    blocksHtml +
    `<div class="complete-area">
      <button class="${btnClass}" onclick="handleComplete()"${btnDisabled}>${btnLabel}</button>
    </div>`;

  window.scrollTo(0, 0);
}

function renderAll() {
  current = getActiveDay();
  updateCycleBar();
  renderContent();
  addSwipeListeners(); // attach after DOM is updated
}

function handleComplete() {
  toggleDone(current);
  renderAll();
}

renderAll();
</script>
